services:
  postgres:
    image: postgres:16-alpine
    container_name: employee-monitor-postgres
    environment:
      POSTGRES_DB: employee_monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d employee_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: employee-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: employee-monitor-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: monitor
      MINIO_ROOT_PASSWORD: monitor-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:

