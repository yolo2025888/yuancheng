name: Security Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "23 18 * * *"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  backend-python:
    name: Backend Python dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Audit backend project dependencies
        run: python -m pip_audit .

  frontend-npm:
    name: Frontend npm dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit all production frontend vulnerabilities
        run: npm audit --omit=dev

  agent-dotnet:
    name: Agent .NET dependency audit
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore agent solution
        run: dotnet restore agent/EmployeeBehavior.Agent.sln

      - name: Audit .NET agent dependencies
        shell: pwsh
        run: |
          $output = dotnet list agent/EmployeeBehavior.Agent.sln package --vulnerable --include-transitive --format json --output-version 1 2>&1
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $report = ($output -join "`n") | ConvertFrom-Json -Depth 100
          $blockingFindings = New-Object System.Collections.Generic.List[string]
          $warningFindings = New-Object System.Collections.Generic.List[string]

          function Find-VulnerablePackage {
            param(
              [object]$Node,
              [string]$Path = ''
            )

            if ($null -eq $Node -or $Node -is [string]) {
              return
            }

            if ($Node -is [System.Collections.IEnumerable]) {
              foreach ($item in $Node) {
                Find-VulnerablePackage -Node $item -Path $Path
              }
              return
            }

            $properties = $Node.PSObject.Properties
            $vulnerabilities = $properties['vulnerabilities']
            if ($null -ne $vulnerabilities -and @($vulnerabilities.Value).Count -gt 0) {
              $packageId = $null
              if ($null -ne $properties['id']) {
                $packageId = $properties['id'].Value
              }
              if ([string]::IsNullOrWhiteSpace([string]$packageId) -and $null -ne $properties['name']) {
                $packageId = $properties['name'].Value
              }
              if ([string]::IsNullOrWhiteSpace([string]$packageId)) {
                $packageId = $Path
              }

              foreach ($vulnerability in @($vulnerabilities.Value)) {
                $severity = ''
                if ($null -ne $vulnerability.PSObject.Properties['severity']) {
                  $severity = [string]$vulnerability.severity
                }

                $finding = "$packageId severity=$severity"
                if ($severity -match '^(high|critical)$' -or [string]::IsNullOrWhiteSpace($severity)) {
                  $blockingFindings.Add($finding)
                }
                else {
                  $warningFindings.Add($finding)
                }
              }
            }

            foreach ($property in $properties) {
              Find-VulnerablePackage -Node $property.Value -Path $(if ($Path) { "$Path.$($property.Name)" } else { $property.Name })
            }
          }

          Find-VulnerablePackage -Node $report

          foreach ($finding in $warningFindings) {
            Write-Warning "Non-blocking .NET vulnerability: $finding"
          }

          if ($blockingFindings.Count -gt 0) {
            throw "High, critical, or unknown-severity .NET vulnerabilities detected: $($blockingFindings -join ', ')"
          }
