name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Run backend tests
        run: python -m pytest

      - name: Run backend attendance smoke
        run: python scripts/smoke_attendance_flow.py

  frontend:
    name: Frontend build and audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: |
          npm run smoke:routes
          npm run build

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=high

  docker-config:
    name: Docker compose config
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose file
        env:
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password-change-me
          POSTGRES_DB: employee_monitor
          POSTGRES_USER: ci-postgres-user
          POSTGRES_PASSWORD: ci-postgres-password-change-me
        run: docker compose -f deploy/docker-compose.yml config --quiet

  static-guard:
    name: Static safety guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify forbidden collection capabilities are absent
        shell: pwsh
        run: |
          $patterns = @(
            'GetAsyncKeyState',
            'GetKeyState',
            'ToUnicode',
            'OpenClipboard',
            'GetClipboardData',
            'SetClipboard',
            'CopyToClipboard',
            'MediaCapture',
            'webcam',
            'microphone',
            'camera',
            'stealth',
            'undetect',
            'anti-detection',
            'keylogger',
            'remote-control',
            'remote control',
            'CreateProcess'
          )
          $allowedBoundaryFiles = @(
            'github/workflows/ci.yml',
            'agent/README.md',
            'docs/AGENT_DEPLOYMENT_RUNBOOK.md',
            'agent/scripts/Test-LauncherDisclosure.ps1',
            'agent/src/EmployeeBehavior.Agent.Launcher/LauncherForm.cs',
            'agent/src/EmployeeBehavior.Agent.SessionHelper/appsettings.json.example',
            'frontend/src/pages/ScreenshotDetail.tsx',
            'frontend/src/services/adminApi.ts',
            'frontend/src/pages/Policies.tsx'
          )
          $excludedPathPrefixes = @(
            '.git/',
            '.codex-pytmp/',
            '.codex-smoke-tmp/',
            '.pytest_cache/',
            '.pytest_tmp/',
            'frontend/node_modules/',
            'frontend/dist/',
            'agent/publish/'
          )
          $excludedPathFragments = @(
            '/bin/',
            '/obj/'
          )
          $excludedFiles = @(
            'frontend/package-lock.json'
          )
          $candidateFiles = Get-ChildItem -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object {
              $relative = Resolve-Path -Relative $_.FullName
              $relative = $relative.TrimStart('.', '/', '\').Replace('\', '/')
              $isExcludedPrefix = @($excludedPathPrefixes | Where-Object { $relative.StartsWith($_, [System.StringComparison]::OrdinalIgnoreCase) }).Count -gt 0
              $isExcludedFragment = @($excludedPathFragments | Where-Object { $relative.IndexOf($_, [System.StringComparison]::OrdinalIgnoreCase) -ge 0 }).Count -gt 0
              -not $isExcludedPrefix -and -not $isExcludedFragment -and $excludedFiles -notcontains $relative
            }

          $matches = $candidateFiles |
            Select-String -Pattern $patterns -SimpleMatch |
            Where-Object {
              $relative = Resolve-Path -Relative $_.Path
              $relative = $relative.TrimStart('.', '/', '\').Replace('\', '/')
              $allowedBoundaryFiles -notcontains $relative
            }

          if ($matches) {
            $matches | ForEach-Object { Write-Error "$($_.Path):$($_.LineNumber): $($_.Line)" }
            exit 1
          }

      - name: Verify sample env does not use legacy backend keys or fixed secrets
        shell: pwsh
        run: |
          $forbidden = @(
            '^APP_ENV=',
            '^DATABASE_URL=',
            'monitor-secret',
            'POSTGRES_PASSWORD:\s*monitor',
            'S3_SECRET_KEY=monitor',
            'DATABASE_URL=.*:monitor@',
            'MINIO_ROOT_PASSWORD:\s*monitor',
            'MINIO_ROOT_USER:\s*monitor'
          )
          $matches = Get-ChildItem -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object {
              $_.FullName -notmatch '\\.git\\' -and
              $_.FullName -notmatch 'frontend[\\/]node_modules' -and
              $_.FullName -notmatch 'agent[\\/]publish' -and
              $_.FullName -notmatch '[\\/]bin[\\/]' -and
              $_.FullName -notmatch '[\\/]obj[\\/]'
            } |
            Select-String -Pattern $forbidden |
            Where-Object {
              $relative = Resolve-Path -Relative $_.Path
              $relative = $relative.TrimStart('.', '/', '\').Replace('\', '/')
              $relative -notin @('backend/tests/test_auth_api.py', 'github/workflows/ci.yml')
            }

          if ($matches) {
            $matches | ForEach-Object { Write-Error "$($_.Path):$($_.LineNumber): $($_.Line)" }
            exit 1
          }

  agent-windows:
    name: Windows agent build
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore agent solution
        run: dotnet restore agent/EmployeeBehavior.Agent.sln

      - name: Build agent solution
        run: dotnet build agent/EmployeeBehavior.Agent.sln --configuration Release --no-restore

      - name: Parse PowerShell deployment scripts
        shell: pwsh
        run: |
          $scripts = @(
            'agent/scripts/Install-AgentPilot.ps1',
            'agent/scripts/Uninstall-AgentPilot.ps1',
            'agent/scripts/Test-AgentDeployment.ps1',
            'agent/scripts/Test-AgentPublish.ps1',
            'agent/scripts/Test-AgentRuntimeSmoke.ps1',
            'agent/scripts/Test-LauncherDisclosure.ps1',
            'agent/scripts/Test-ScreenshotCaptureGuard.ps1',
            'agent/scripts/Set-AgentProductionConfig.ps1',
            'agent/scripts/Write-AgentProtectedToken.ps1'
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $script), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Validate agent deployment config
        shell: pwsh
        run: >
          ./agent/scripts/Test-AgentDeployment.ps1
          -ServiceConfigPath ./agent/src/EmployeeBehavior.Agent.Service/appsettings.json.example
          -HelperConfigPath ./agent/src/EmployeeBehavior.Agent.SessionHelper/appsettings.json.example

      - name: Run agent safety smoke scripts
        shell: pwsh
        run: |
          ./agent/scripts/Test-LauncherDisclosure.ps1
          ./agent/scripts/Test-ScreenshotCaptureGuard.ps1

      - name: Smoke Set-AgentProductionConfig success path
        shell: pwsh
        run: |
          $tempRoot = Join-Path $env:RUNNER_TEMP 'set-agent-production-config-success'
          if (Test-Path -LiteralPath $tempRoot) {
            Remove-Item -LiteralPath $tempRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $tempRoot | Out-Null
          $configPath = Join-Path $tempRoot 'appsettings.json'
          $tokenPath = Join-Path $tempRoot 'agent-token.protected.json'

          Copy-Item -LiteralPath ./agent/src/EmployeeBehavior.Agent.Service/appsettings.json.example -Destination $configPath -Force
          Set-Content -LiteralPath $tokenPath -Value '{"token":"smoke"}' -Encoding UTF8

          $result = ./agent/scripts/Set-AgentProductionConfig.ps1 `
            -ConfigPath $configPath `
            -ApiBaseUrl 'https://agent-ci.company-monitoring.com' `
            -ProtectedTokenPath $tokenPath `
            -ClearApiToken

          if (-not $result) {
            throw 'Set-AgentProductionConfig.ps1 did not return a result object for the success smoke path.'
          }

          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          if ($config.AgentService.ApiBaseUrl -ne 'https://agent-ci.company-monitoring.com') {
            throw "Expected ApiBaseUrl rewrite to persist in $configPath."
          }

          if ($config.AgentService.ProtectedTokenPath -ne $tokenPath) {
            throw "Expected ProtectedTokenPath rewrite to persist in $configPath."
          }

          if ($config.AgentService.DryRun -ne $false) {
            throw "Expected DryRun=false after Set-AgentProductionConfig success smoke in $configPath."
          }

          if ($config.AgentService.ApiToken -ne '') {
            throw "Expected ApiToken to be cleared after Set-AgentProductionConfig success smoke in $configPath."
          }

          if ($result.ApiTokenMode -ne 'cleared') {
            throw "Expected ApiTokenMode=cleared but got '$($result.ApiTokenMode)'."
          }

      - name: Smoke Set-AgentProductionConfig rejection path
        shell: pwsh
        run: |
          $tempRoot = Join-Path $env:RUNNER_TEMP 'set-agent-production-config-reject'
          if (Test-Path -LiteralPath $tempRoot) {
            Remove-Item -LiteralPath $tempRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $tempRoot | Out-Null
          $configPath = Join-Path $tempRoot 'appsettings.json'
          Copy-Item -LiteralPath ./agent/src/EmployeeBehavior.Agent.Service/appsettings.json.example -Destination $configPath -Force

          try {
            ./agent/scripts/Set-AgentProductionConfig.ps1 `
              -ConfigPath $configPath `
              -ApiBaseUrl 'https://api.company.example' `
              -ProtectedTokenPath (Join-Path $tempRoot 'missing-token.protected.json') `
              -ClearApiToken
            throw 'Expected Set-AgentProductionConfig.ps1 rejection smoke to fail for reserved ApiBaseUrl.'
          }
          catch {
            if ($_.Exception.Message -notmatch 'not suitable for production') {
              throw
            }
          }

      - name: Validate agent publish package shape
        shell: pwsh
        run: |
          # CI has no production backend or device token. This is intentionally
          # pilot/package-shape validation; strict production gates stay in the
          # release checklist and protected deployment environment.
          $publishRoot = Join-Path $env:RUNNER_TEMP 'employee-agent-publish'
          if (Test-Path -LiteralPath $publishRoot) {
            Remove-Item -LiteralPath $publishRoot -Recurse -Force
          }

          $serviceOutput = Join-Path $publishRoot 'Service'
          $helperOutput = Join-Path $publishRoot 'SessionHelper'
          $launcherOutput = Join-Path $publishRoot 'Launcher'

          dotnet publish ./agent/src/EmployeeBehavior.Agent.Service/EmployeeBehavior.Agent.Service.csproj --configuration Release --runtime win-x64 --self-contained false --output $serviceOutput
          dotnet publish ./agent/src/EmployeeBehavior.Agent.SessionHelper/EmployeeBehavior.Agent.SessionHelper.csproj --configuration Release --runtime win-x64 --self-contained false --output $helperOutput
          dotnet publish ./agent/src/EmployeeBehavior.Agent.Launcher/EmployeeBehavior.Agent.Launcher.csproj --configuration Release --runtime win-x64 --self-contained false --output $launcherOutput

          Copy-Item -Path (Join-Path $launcherOutput '*') -Destination $publishRoot -Recurse -Force
          Copy-Item -LiteralPath ./agent/scripts/Write-AgentProtectedToken.ps1 -Destination (Join-Path $serviceOutput 'Write-AgentProtectedToken.ps1') -Force
          Copy-Item -LiteralPath ./agent/scripts/Set-AgentProductionConfig.ps1 -Destination (Join-Path $serviceOutput 'Set-AgentProductionConfig.ps1') -Force
          Copy-Item -LiteralPath ./agent/src/EmployeeBehavior.Agent.Service/appsettings.json.example -Destination (Join-Path $serviceOutput 'appsettings.json') -Force
          Copy-Item -LiteralPath ./agent/src/EmployeeBehavior.Agent.SessionHelper/appsettings.json.example -Destination (Join-Path $helperOutput 'appsettings.json') -Force

          ./agent/scripts/Test-AgentPublish.ps1 -PublishRoot $publishRoot

          $tokenPath = Join-Path $serviceOutput 'agent-token.protected.json'
          Set-Content -LiteralPath $tokenPath -Value '{"token":"strict-publish-smoke"}' -Encoding UTF8
          ./agent/scripts/Set-AgentProductionConfig.ps1 `
            -ConfigPath (Join-Path $serviceOutput 'appsettings.json') `
            -ApiBaseUrl 'https://agent-ci.company-monitoring.com' `
            -ProtectedTokenPath $tokenPath `
            -ClearApiToken
          ./agent/scripts/Test-AgentPublish.ps1 -PublishRoot $publishRoot -StrictProduction
          ./agent/scripts/Test-AgentRuntimeSmoke.ps1 -PublishRoot $publishRoot -CleanupStartedProcesses
